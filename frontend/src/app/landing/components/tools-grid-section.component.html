<section id="tools" class="tools">
  <div class="section-header">
    <h2 class="section-title">Todas as ferramentas</h2>
    <p class="section-desc">{{ toolsCount }} utilitários no browser. Clique e use.</p>
  </div>
  <div class="tools-grid">
    @for (tool of tools; track tool.route) {
      <a class="tool-card" [routerLink]="tool.route" [style.--tool-color]="tool.color">
        <div class="tool-card-top">
          <div class="tool-card-icon" [innerHTML]="tool.icon | safeHtml"></div>
          <span class="tool-card-group">{{ tool.group }}</span>
        </div>
        <h3 class="tool-card-title">{{ tool.name }}</h3>
        <p class="tool-card-desc">{{ tool.description }}</p>
      </a>
    }
  </div>
</section>

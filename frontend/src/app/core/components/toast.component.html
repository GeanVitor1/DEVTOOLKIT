@if (toast.visible()) {
  <div class="toast-overlay" (click)="toast.hide()" (keydown)="toast.hide()" tabindex="0"></div>
  <div class="toast" [class]="'toast-' + toast.data().type" role="alert">
    <span class="toast-message">{{ toast.data().message }}</span>
    <button class="toast-close" (click)="toast.hide()" aria-label="Fechar">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
}

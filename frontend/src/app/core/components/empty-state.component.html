<div class="empty-state">
  @if (icon()) {
    <span class="empty-icon">{{ icon() }}</span>
  }
  <h3 class="empty-title">{{ title() }}</h3>
  @if (description()) {
    <p class="empty-desc">{{ description() }}</p>
  }
  @if (actionLabel()) {
    <button class="empty-action" (click)="action.emit()">{{ actionLabel() }}</button>
  }
</div>

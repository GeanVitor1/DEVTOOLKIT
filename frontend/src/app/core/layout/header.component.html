<header class="header">
  <div class="header-left">
    <button class="header-menu-btn" (click)="layout.toggleSidebar()" aria-label="Abrir menu">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
        <line x1="3" y1="6" x2="21" y2="6"/>
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
    <div class="header-breadcrumb">
      <a class="header-breadcrumb-link" routerLink="/tools">Tools</a>
      @if (currentTool(); as tool) {
        <svg class="header-breadcrumb-chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
        <span class="header-breadcrumb-current" [style.--crumb-color]="tool.color">{{ tool.name }}</span>
      }
    </div>
  </div>

  <button class="header-search-trigger" (click)="toggleSearch()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <span>Buscar ferramenta...</span>
    <kbd class="header-kbd">⌘K</kbd>
  </button>

  <div class="header-right">
    <button class="header-theme-btn" (click)="theme.toggle()" [attr.aria-label]="theme.isDark() ? 'Modo claro' : 'Modo escuro'">
      @if (theme.isDark()) {
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      } @else {
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      }
    </button>
  </div>
</header>

@if (searchOpen()) {
  <div class="search-backdrop" (click)="closeSearch()"></div>
  <div class="search-modal">
    <div class="search-input-row">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input
        class="search-input"
        type="text"
        placeholder="Buscar ferramenta..."
        [value]="searchQuery()"
        (input)="onSearchInput($any($event.target).value)"
        autofocus
      />
      <kbd class="search-esc">ESC</kbd>
    </div>
    <div class="search-results">
      @for (tool of filteredTools(); track tool.route; let i = $index) {
        <button
          class="search-result"
          [class.active]="i === selectedIndex()"
          [style.--result-color]="tool.color"
          (click)="selectTool(tool)"
          (mouseenter)="selectedIndex.set(i)"
        >
          <span class="search-result-dot" [style.background]="tool.color"></span>
          <span class="search-result-name">{{ tool.name }}</span>
          <span class="search-result-group">{{ tool.group }}</span>
        </button>
      } @empty {
        <div class="search-empty">Nenhuma ferramenta encontrada</div>
      }
    </div>
  </div>
}

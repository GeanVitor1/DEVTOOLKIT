<header class="header">
  <div class="header-left">
    <button class="header-menu-btn" (click)="layout.toggleSidebar()" aria-label="Abrir menu">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
        <line x1="3" y1="6" x2="21" y2="6"/>
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
    <div class="header-breadcrumb">
      <a class="header-breadcrumb-link" routerLink="/tools">Tools</a>
      @if (currentTool(); as tool) {
        <svg class="header-breadcrumb-chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
        <span class="header-breadcrumb-current" [style.--crumb-color]="tool.color">{{ tool.name }}</span>
      }
    </div>
  </div>
</header>

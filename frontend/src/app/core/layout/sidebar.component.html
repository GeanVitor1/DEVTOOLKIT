<aside class="sidebar" [class.open]="layout.sidebarOpen()">
  @if (layout.sidebarOpen()) {
    <div class="sidebar-backdrop" (click)="layout.toggleSidebar()" (keydown)="layout.toggleSidebar()" tabindex="0"></div>
  }
  <div class="sidebar-inner">
    <div class="sidebar-header">
      <a class="sidebar-logo" routerLink="/" (click)="layout.sidebarOpen.set(false)">
        <span class="sidebar-logo-mark">&lt;/&gt;</span>
        <span class="sidebar-logo-text">DevToolkit</span>
      </a>
    </div>

    <nav class="sidebar-nav">
      @for (group of groups; track group.label) {
        <div class="sidebar-group">
          <span class="sidebar-group-label">{{ group.label }}</span>
          @for (item of group.items; track item.route) {
            <a
              class="sidebar-item"
              [routerLink]="item.route"
              routerLinkActive="active"
              [style.--item-color]="item.color"
              (click)="layout.sidebarOpen.set(false)"
            >
              <span class="sidebar-item-icon" [innerHTML]="item.icon | safeHtml"></span>
              <span class="sidebar-item-label">{{ item.label }}</span>
              <span class="sidebar-item-indicator"></span>
            </a>
          }
        </div>
      }
    </nav>

    <div class="sidebar-footer">
      <div class="sidebar-theme">
        <button class="sidebar-theme-btn" (click)="theme.toggle()" [attr.aria-label]="theme.isDark() ? 'Light mode' : 'Dark mode'">
          @if (theme.isDark()) {
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          } @else {
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          }
        </button>
      </div>
      <span class="sidebar-version">v1.0</span>
    </div>
  </div>
</aside>

<aside class="sidebar" [class.open]="layout.sidebarOpen()">
  @if (layout.sidebarOpen()) {
    <div class="sidebar-backdrop" (click)="layout.toggleSidebar()" (keydown)="layout.toggleSidebar()" tabindex="0"></div>
  }
  <div class="sidebar-inner">
    <a class="sidebar-logo" routerLink="/" (click)="layout.sidebarOpen.set(false)">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>
      </svg>
      <span>DevToolkit</span>
    </a>

    <nav class="sidebar-nav">
      @for (group of groups; track group.label) {
        <div class="sidebar-group">
          <span class="sidebar-group-label">{{ group.label }}</span>
          @for (item of group.items; track item.route) {
            <a
              class="sidebar-item"
              [routerLink]="item.route"
              routerLinkActive="active"
              [style.--item-color]="item.color"
              (click)="layout.sidebarOpen.set(false)"
            >
              <span class="sidebar-item-icon" [innerHTML]="item.icon | safeHtml"></span>
              <span class="sidebar-item-label">{{ item.label }}</span>
            </a>
          }
        </div>
      }
    </nav>

    <div class="sidebar-footer">
      <span class="sidebar-version">v1.0</span>
    </div>
  </div>
</aside>

<div class="tool-page">
  <div class="tool-page-header">
    <div class="tool-page-icon" style="--page-color: var(--dtk-xml)">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>
      </svg>
    </div>
    <div class="tool-page-info">
      <h1 class="tool-page-title">XML Formatter</h1>
      <p class="tool-page-desc">Formate, valide e minifique XML</p>
    </div>
  </div>

  <div class="codec-controls">
    <div class="sql-toggle">
      <button class="sql-toggle-btn" [class.active]="mode() === 'format'" (click)="mode.set('format'); process()">Formatar</button>
      <button class="sql-toggle-btn" [class.active]="mode() === 'minify'" (click)="mode.set('minify'); process()">Minificar</button>
    </div>

    <div class="sql-control-spacer"></div>

    <button class="gen-btn" (click)="process()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
      Processar
    </button>
  </div>

  <div class="codec-panels">
    <div class="codec-panel">
      <div class="codec-panel-header">
        <span class="codec-panel-label">XML de entrada</span>
        <button class="tool-action-sm" (click)="clear()">Limpar</button>
      </div>
      <textarea
        class="codec-textarea"
        placeholder="Cole seu XML aqui..."
        [value]="input()"
        (input)="input.set($any($event.target).value); process()"
        rows="8"
      ></textarea>
    </div>

    <div class="codec-panel">
      <div class="codec-panel-header">
        <span class="codec-panel-label">{{ mode() === 'format' ? 'XML formatado' : 'XML minificado' }}</span>
        @if (output()) {
          <app-copy-button [value]="output()" size="sm" label="Copy" />
        }
      </div>
      <div class="codec-output" [class.has-error]="error()">
        @if (error()) {
          <span class="codec-error">{{ error() }}</span>
        } @else if (output()) {
          <code class="codec-output-text">{{ output() }}</code>
        } @else {
          <span class="codec-placeholder">O resultado aparecerá aqui...</span>
        }
      </div>
    </div>
  </div>
</div>

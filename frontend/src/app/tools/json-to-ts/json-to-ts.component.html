<div class="tool-page">
  <div class="tool-page-header">
    <div class="tool-page-icon" style="--page-color: var(--dtk-json)">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>
      </svg>
    </div>
    <div class="tool-page-info">
      <h1 class="tool-page-title">JSON to TypeScript</h1>
      <p class="tool-page-desc">Converta JSON em interfaces ou types TypeScript automaticamente</p>
    </div>
  </div>

  <div class="jtt-panels">
    <div class="jtt-panel">
      <div class="jtt-panel-header">
        <span class="jtt-panel-label">JSON</span>
        <button class="tool-action-sm" (click)="loadSample()">Exemplo</button>
      </div>
      <textarea
        class="jtt-textarea"
        placeholder='Cole seu JSON aqui...\n{\n  "name": "John",\n  "age": 30\n}'
        [value]="input()"
        (input)="input.set($any($event.target).value)"
        rows="16"
      ></textarea>
    </div>

    <div class="jtt-panel">
      <div class="jtt-panel-header">
        <span class="jtt-panel-label">TypeScript</span>
        @if (output()) {
          <button class="tool-action-sm" (click)="copyOutput()">Copiar</button>
        }
      </div>
      @if (output()) {
        <pre class="jtt-output"><code>{{ output() }}</code></pre>
      } @else if (error()) {
        <div class="jtt-error">{{ error() }}</div>
      } @else {
        <div class="jtt-placeholder">O resultado aparecerá aqui...</div>
      }
    </div>
  </div>

  <div class="jtt-controls">
    <div class="jtt-option-group">
      <label class="sql-control-label">Nome da Interface</label>
      <input class="jtt-input" type="text" [value]="interfaceName()" (input)="interfaceName.set($any($event.target).value)" placeholder="RootObject" />
    </div>

    <label class="pw-option">
      <input type="checkbox" [checked]="useOptional()" (change)="useOptional.set($any($event.target).checked)" />
      <span>Campos opcionais</span>
    </label>

    <label class="pw-option">
      <input type="checkbox" [checked]="useType()" (change)="useType.set($any($event.target).checked)" />
      <span>Usar type ao invés de interface</span>
    </label>

    <div class="sql-control-spacer"></div>

    <button class="gen-btn" (click)="convert()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
      Converter
    </button>
  </div>
</div>

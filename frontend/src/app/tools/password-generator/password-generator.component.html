<div class="tool-page">
  <div class="tool-page-header">
    <div class="tool-page-icon" style="--page-color: var(--dtk-password)">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
    </div>
    <div class="tool-page-info">
      <h1 class="tool-page-title">Password Generator</h1>
      <p class="tool-page-desc">Gere senhas fortes e seguras</p>
    </div>
  </div>

  <div class="pwd-card">
    <div class="pwd-display" [class.clickable]="!!password()" (click)="copyPassword()" [title]="password() ? 'Clique para copiar' : ''">
      <span class="pwd-text">{{ password() || 'Clique em Gerar para criar uma senha' }}</span>
      @if (password()) {
        <app-copy-button [value]="password()" size="sm" label="Copy" />
      }
    </div>
    @if (password()) {
      <div class="pwd-strength">
        <div class="pwd-strength-bar">
          <div class="pwd-strength-fill" [class]="'pwd-strength-' + strength()"></div>
        </div>
        <span class="pwd-strength-label" [class]="'pwd-strength-' + strength()">{{ getStrengthLabel() }}</span>
      </div>
    }
  </div>

  <div class="pwd-options">
    <div class="pwd-option-row">
      <label class="pwd-option-label">Comprimento: <strong>{{ length() }}</strong></label>
      <div class="pwd-slider-group">
        <input type="range" class="pwd-slider" min="4" max="64" [value]="length()" (input)="length.set(+$any($event.target).value)" />
        <div class="pwd-slider-labels">
          <span>4</span><span>16</span><span>32</span><span>48</span><span>64</span>
        </div>
      </div>
    </div>

    <div class="pwd-option-row">
      <label class="pwd-checkbox">
        <input type="checkbox" [checked]="useUppercase()" (change)="useUppercase.set($any($event.target).checked)" />
        <span class="pwd-checkmark"></span>
        ABC (Maiúsculas)
      </label>
      <label class="pwd-checkbox">
        <input type="checkbox" [checked]="useLowercase()" (change)="useLowercase.set($any($event.target).checked)" />
        <span class="pwd-checkmark"></span>
        abc (Minúsculas)
      </label>
      <label class="pwd-checkbox">
        <input type="checkbox" [checked]="useNumbers()" (change)="useNumbers.set($any($event.target).checked)" />
        <span class="pwd-checkmark"></span>
        123 (Números)
      </label>
      <label class="pwd-checkbox">
        <input type="checkbox" [checked]="useSymbols()" (change)="useSymbols.set($any($event.target).checked)" />
        <span class="pwd-checkmark"></span>
        #$& (Símbolos)
      </label>
    </div>

    <button class="gen-btn" (click)="generate()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      Gerar Senha
    </button>
  </div>
</div>

<div class="tool-page">
  <div class="tool-page-header">
    <div class="tool-page-icon" style="--page-color: var(--dtk-lorem)">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="12" y1="12" x2="12" y2="20"/>
      </svg>
    </div>
    <div class="tool-page-info">
      <h1 class="tool-page-title">Lorem Ipsum Generator</h1>
      <p class="tool-page-desc">Gere texto placeholder para seus projetos</p>
    </div>
  </div>

  <div class="lorem-options">
    <div class="lorem-option-row">
      <div class="sql-toggle">
        <button class="sql-toggle-btn" [class.active]="type() === 'paragraphs'" (click)="type.set('paragraphs'); generate()">Parágrafos</button>
        <button class="sql-toggle-btn" [class.active]="type() === 'sentences'" (click)="type.set('sentences'); generate()">Frases</button>
        <button class="sql-toggle-btn" [class.active]="type() === 'words'" (click)="type.set('words'); generate()">Palavras</button>
      </div>

      <div class="lorem-count">
        <button class="lorem-count-btn" (click)="decrement()">−</button>
        <span class="lorem-count-value">{{ count() }}</span>
        <button class="lorem-count-btn" (click)="increment()">+</button>
      </div>

      <button class="gen-btn" (click)="generate()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        Gerar
      </button>
    </div>
  </div>

  @if (output()) {
    <div class="lorem-output-card">
      <div class="lorem-output-header">
        <span class="codec-panel-label">Texto gerado</span>
        <app-copy-button [value]="output()" size="sm" label="Copiar" />
      </div>
      <div class="lorem-output">
        @for (p of output().split('\n\n'); track $index) {
          <p class="lorem-paragraph">{{ p }}</p>
        }
      </div>
    </div>
  }

</div>
